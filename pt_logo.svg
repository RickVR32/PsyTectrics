<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <style>
      .logo-mark { fill: none; stroke: #00D4FF; stroke-width: 1.8; stroke-linecap: round; }
      .logo-node { fill: #00D4FF; }
      .logo-text { fill: #FAFAF9; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; }
      .logo-tm { fill: #00D4FF; font-family: 'Space Mono', monospace; font-size: 6px; }
    </style>
  </defs>
  <!-- P letterform from circuit lines -->
  <line x1="8" y1="8" x2="8" y2="32" class="logo-mark"/>
  <path d="M8 8 Q22 8 22 16 Q22 24 8 24" class="logo-mark" fill="none"/>
  <!-- nodes on the P -->
  <circle cx="8" cy="8" r="1.8" class="logo-node"/>
  <circle cx="8" cy="32" r="1.8" class="logo-node"/>
  <circle cx="8" cy="24" r="1.8" class="logo-node"/>
  <circle cx="22" cy="16" r="1.8" class="logo-node"/>
  <!-- connector lines suggesting network -->
  <line x1="22" y1="16" x2="28" y2="10" class="logo-mark" stroke-dasharray="1,2"/>
  <line x1="22" y1="16" x2="28" y2="22" class="logo-mark" stroke-dasharray="1,2"/>
  <circle cx="28" cy="10" r="1.2" class="logo-node" opacity="0.5"/>
  <circle cx="28" cy="22" r="1.2" class="logo-node" opacity="0.5"/>
  <!-- Wordmark -->
  <text x="34" y="25" class="logo-text">PSYTECTRICS</text>
</svg>
